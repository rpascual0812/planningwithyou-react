<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rafael Pascual — Calling Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --brand-navy: #1c365a;
        --brand-navy-dark: #122846;
        --brand-navy-darker: #081427;
        --brand-green: #3eb085;
        --brand-green-light: #7ed0ad;
        --brand-gold: #d4af6a;
        --card-w: 1050px;
        --card-h: 600px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: #fff;
      }

      body {
        font-family: Inter, system-ui, sans-serif;
      }

      .card {
        width: var(--card-w);
        height: var(--card-h);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 3.25rem 3.5rem;
        background: linear-gradient(
          145deg,
          var(--brand-navy-darker) 0%,
          var(--brand-navy) 48%,
          #234a72 100%
        );
        color: #fff;
      }

      .card::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse 520px 320px at 100% 0%,
            rgba(62, 176, 133, 0.22),
            transparent 70%
          ),
          radial-gradient(
            ellipse 420px 280px at 0% 100%,
            rgba(212, 175, 106, 0.12),
            transparent 65%
          );
        pointer-events: none;
      }

      .card::after {
        content: '';
        position: absolute;
        left: 3.5rem;
        right: 3.5rem;
        bottom: 0;
        height: 4px;
        background: linear-gradient(
          90deg,
          var(--brand-gold) 0%,
          var(--brand-green) 55%,
          transparent 100%
        );
      }

      .card-top,
      .card-bottom {
        position: relative;
        z-index: 1;
      }

      .card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 2rem;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .brand img {
        width: 72px;
        height: auto;
        filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.25));
      }

      .brand-text {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
      }

      .brand-name {
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: rgba(255, 255, 255, 0.92);
      }

      .brand-url {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--brand-green-light);
        letter-spacing: 0.02em;
      }

      .role {
        text-align: right;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
        max-width: 12rem;
        line-height: 1.45;
      }

      .card-bottom {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }

      .person-name {
        margin: 0;
        font-size: 3.15rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1;
      }

      .gold-line {
        width: 64px;
        height: 4px;
        border-radius: 999px;
        background: var(--brand-gold);
      }

      .contact-list {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .contact-list li {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        font-size: 1.05rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.88);
      }

      .contact-icon {
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }

      .contact-icon svg {
        width: 1rem;
        height: 1rem;
        fill: var(--brand-green-light);
      }
    </style>
  </head>
  <body>
    <article class="card" aria-label="Calling card">
      <div class="card-top">
        <div class="brand">
          <img src="/assets/images/logo.png" alt="" width="72" height="72" />
          <div class="brand-text">
            <span class="brand-name">Planning With You</span>
            <span class="brand-url">planningwithyou.com</span>
          </div>
        </div>
        <p class="role">Event planning platform</p>
      </div>

      <div class="card-bottom">
        <h1 class="person-name">Rafael Pascual</h1>
        <div class="gold-line" aria-hidden="true"></div>
        <ul class="contact-list">
          <li>
            <span class="contact-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M6.6 10.8c1.5 2.9 3.7 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"
                />
              </svg>
            </span>
            <span>0916 205 2424</span>
          </li>
          <li>
            <span class="contact-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"
                />
              </svg>
            </span>
            <span>rafael@planningwithyou.com</span>
          </li>
        </ul>
      </div>
    </article>
  </body>
</html>
